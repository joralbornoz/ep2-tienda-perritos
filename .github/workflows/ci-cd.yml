name: 🐶 CI/CD - Tienda Perritos

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # =========================
  # 🧪 1. TESTS
  # =========================
  test:
    name: Pruebas Unitarias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: |
          cd backend
          npm install

      - name: Ejecutar tests con cobertura
        run: |
          cd backend
          npm test

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/

  # =========================
  # 📊 2. SONARCLOUD
  # =========================
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias y generar cobertura
        run: |
          cd backend
          npm install
          npm test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # =========================
  # 🐳 3. BUILD DOCKER
  # =========================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build imagen backend
        run: docker build -t tienda-perritos-backend:${{ github.sha }} ./backend

      - name: Build imagen frontend
        run: docker build -t tienda-perritos-frontend:${{ github.sha }} ./frontend

      - name: Verificar imágenes
        run: docker images | grep tienda-perritos

  # =========================
  # 🚀 4. DEPLOY
  # =========================
  deploy:
    name: Deploy Entorno Simulado
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Levantar entorno con Docker Compose
        run: |
          docker compose down --volumes
          docker compose build --no-cache
          docker compose up -d

      - name: Esperar que los servicios inicien
        run: Start-Sleep -Seconds 15

      - name: Health check backend
        run: |
          $response = Invoke-WebRequest -Uri http://localhost:3001/api/health -UseBasicParsing
          if ($response.StatusCode -eq 200) {
            Write-Host "✅ Backend OK"
          } else {
            Write-Host "❌ Backend FAIL"
            exit 1
          }

      - name: Health check frontend
        run: |
          $response = Invoke-WebRequest -Uri http://localhost:8080 -UseBasicParsing
          if ($response.StatusCode -eq 200) {
            Write-Host "✅ Frontend OK"
          } else {
            Write-Host "❌ Frontend FAIL"
            exit 1
          }